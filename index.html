    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: #181818;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            gap: 20px;
        }

        
        .row {
            display: flex;
            flex-wrap: wrap;
            width: 90%;
            gap: 30px;
            padding: 20px;
            max-width: 1200px;
            justify-content: space-evenly; /* Center the columns */
        }

        .column {
            flex: 1 1 22%;
            gap: 10px;
        }

        .column div{
            margin-top: 10px;
            vertical-align: middle;
        }

        .box {
            background-color: #ffffff;
            
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .box:hover {
            transform: translateY(-5px);
        }

        .box.large {
            height: 61vh;
            background-color: #212B26;
            color: #ffffff;
        }

        .box.small {
            height: 30vh;
            background-color: #212B26;
        }
        .box.small.clook {
            color: #478465;
        }
        .box.extra-large {
            height: 93vh;
            background-color: #212B26;
            color: #ffffff;
        }

        /* Typography */
        .box h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #333;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }

        .box p, .box ul, .box ol {
            font-size: 1rem;
            line-height: 1.6;
            color: #ffffff;
        }

        .box ul, .box ol {
            list-style-type: disc;
            margin-left: 20px;
        }

        /* Form Elements */
        .box input[type="text"], .box textarea {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            resize: vertical;
        }

        .box button {
            background-color: #82c885;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .box button:hover {
            background-color: #82c885;
        }

        /* Tables */
        .box table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .box th, .box td {
            border: 1px solid #eee;
            padding: 8px 12px;
            text-align: left;
        }

        .box th {
            background-color: #f9f9f9;
        }

        /* Music Player */
        .music-player audio {
            width: 100%;
        }

        /* Links */
        .box a {
            color: #82c885;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .box a:hover {
            color: #82c885;
            text-decoration: underline;
        }

        .digit {
            position: relative;
            background-color: #333;
            color: #fff;
            font-size: 80px;
            font-weight: bold;
            width: 140px;
            height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            overflow: hidden;
        }

        .digit::before,
        .digit::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 50%;
            background: #222;
            z-index: 1;
        }

        .digit::before {
            top: 0;
            border-bottom: 2px solid #111;
        }

        .digit::after {
            bottom: 0;
            border-top: 2px solid #111;
        }

        .label {
            font-size: 16px;
            text-transform: uppercase;
        }
        
        .banner {
            width: 100%;

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        
        // Get elements
        const authButton = document.getElementById('authButton');
        const userInfo = document.getElementById('userInfo');
        
        // Configure Google auth provider
        const googleProvider = new firebase.auth.GoogleAuthProvider();
        googleProvider.setCustomParameters({
            prompt: 'select_account' // Force account selection even if user is already signed in
        });
        
        // Auth state listener
        firebase.auth().onAuthStateChanged(function(user) {
            if (user) {
                // User is signed in
                authButton.style.display = 'none'; // Hide the sign-in button
                userInfo.style.display = 'flex'; // Show user info
                
                // Add user info with profile picture if available
                const photoURL = user.photoURL || 'default-avatar.png';
                userInfo.innerHTML = `
                    <img src="${photoURL}" alt="Profile" class="user-avatar">
                    <span>Hi, ${user.displayName || user.email.split('@')[0]}</span>
                    <button id="signOutButton" class="auth-button" style="margin-left: 10px; padding: 5px 10px; font-size: 0.9rem;">Sign Out</button>
                `;
                
                // Add sign out functionality
                document.getElementById('signOutButton').addEventListener('click', function() {
                    firebase.auth().signOut().then(function() {
                        console.log('Signed out successfully');
                    }).catch(function(error) {
                        console.error('Sign out error:', error);
                    });
                });
            } else {
                // User is signed out
                authButton.style.display = 'flex'; // Show the sign-in button
                userInfo.style.display = 'none'; // Hide user info
            }
        });
        
        // Google sign-in functionality
        authButton.addEventListener('click', function() {
            firebase.auth()
                .signInWithPopup(googleProvider)
                .then((result) => {
                    // User successfully signed in
                    console.log('User signed in:', result.user.email);
                })
                .catch((error) => {
                    console.error('Google sign in error:', error);
                    alert('Sign in error: ' + error.message);
                });
        });
        
        // Your existing clock function
        function updateClockAndDate() {
            var now = new Date();
            var hours = now.getHours();
            var minutes = now.getMinutes();
            var seconds = now.getSeconds();
            var ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            var timeString = hours + ':' + minutes + ':' + seconds + ' ' + ampm;
            document.getElementById('clock').innerHTML = timeString;

            var options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            var dateString = now.toLocaleDateString('en-US', options);
            document.getElementById('date').innerHTML = dateString;
        }
        setInterval(updateClockAndDate, 1000);
        updateClockAndDate();
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            let timetable = getTimetableData();
            timetable.forEach(item => {
                updateDayBox(item.day, item.time, item.subject);
            });
        });
        
        function updateDayBox(day, time, subject) {
            let dayBox = document.getElementById(`${day.toLowerCase()}-content`);
            if (dayBox) {
                dayBox.textContent = `Time: ${time} - Subject: ${subject}`;
            }
        }
    </script>
